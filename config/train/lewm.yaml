defaults:
  - _self_
  - launcher: local
  - data: sdn
  - model: sdn_jepa

output_model_name: lewm_sdn
output_dir: outputs/checkpoints/lewm_sdn

train_split: 0.9
seed: 3072
embed_dim: 192
prog_dim: 32
history_size: 3
device: auto
gradient_clip_val: 1.0
checkpoint_interval: 10
log_every: 1

trainer:
  max_epochs: 100

loader:
  batch_size: 64
  num_workers: 0
  pin_memory: True

optimizer:
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
  triplet:
    weight: 0.02
    margin: 0.2
  straight:
    weight: 0.01
  metric:
    weight: 0.0
    target_keys:
      - congestion
      - packet_loss
